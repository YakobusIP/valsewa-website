name: _Deploy Backend (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      deploy_path:
        required: true
        type: string
      service_name:
        required: true
        type: string
      timers:
        required: false
        type: string
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    concurrency:
      group: deploy-backend-${{ inputs.environment }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Upload backend via SCP (env-scoped tmp dir)
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port:     ${{ secrets.SSH_PORT }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/dist/,backend/package.json,backend/package-lock.json,backend/prisma/,backend/infrastructure/"
          target: /tmp/deploy/${{ inputs.environment }}/backend
          strip_components: 1

      - name: Remote backend deploy & restart
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port:     ${{ secrets.SSH_PORT }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            SRC="/tmp/deploy/${{ inputs.environment }}/backend"
            DST="${{ inputs.deploy_path }}"

            sudo systemctl stop "${{ inputs.service_name }}" || true

            sudo mkdir -p "$DST"
            sudo rsync -rt --delete "$SRC/" "$DST/"

            # Production: deploy systemd timer units. Staging uses node-cron in-process (backend/src/lib/cron.ts).
            if [ -n "${{ inputs.timers }}" ]; then
              CRON_PREFIX="backend-${{ inputs.environment }}-cron"
              
              # Copy unit files into /etc/systemd/system/
              sudo rsync -rt "$SRC/infrastructure/cron/${{ inputs.environment }}/" /etc/systemd/system/ || true
              sudo systemctl daemon-reload

              # Disable old timers for this env (avoid leftovers)
              sudo systemctl list-unit-files "${CRON_PREFIX}@*.timer" --no-legend 2>/dev/null | awk '{print $1}' | while read -r unit; do
                sudo systemctl disable --now "$unit" || true
              done

              # Enable only requested timers (space-separated list)
              for t in ${{ inputs.timers }}; do
                sudo systemctl enable --now "${CRON_PREFIX}@${t}.timer" || true
              done
            elif [ "${{ inputs.environment }}" = "staging" ]; then
              CRON_PREFIX="backend-staging-cron"
              sudo systemctl list-unit-files "${CRON_PREFIX}@*.timer" --no-legend 2>/dev/null | awk '{print $1}' | while read -r unit; do
                sudo systemctl disable --now "$unit" || true
              done
            fi

            cd "$DST"

            # Setup .env
            cat > "$DST/.env" <<EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DIRECT_URL=${{ secrets.DIRECT_URL }}
            ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}
            REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
            ACCESS_TOKEN_DURATION=${{ vars.ACCESS_TOKEN_DURATION }}
            REFRESH_TOKEN_DURATION=${{ vars.REFRESH_TOKEN_DURATION }}
            GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }}
            BULL_REDIS_IP=${{ secrets.BULL_REDIS_IP }}
            BULL_REDIS_PORT=${{ secrets.BULL_REDIS_PORT }}
            ADMIN_APP_URL=${{ vars.ADMIN_APP_URL }}
            CANONICAL_PUBLIC_APP_URL=${{ vars.CANONICAL_PUBLIC_APP_URL }}
            PUBLIC_APP_URL=${{ vars.PUBLIC_APP_URL }}
            HENRIKDEV_API_KEY=${{ secrets.HENRIKDEV_API_KEY }}
            SCHEDULER_API_KEY=${{ secrets.SCHEDULER_API_KEY }}
            BACKEND_BASE_URL=${{ secrets.BACKEND_BASE_URL }}
            PUB_ACCESS_TOKEN_SECRET=${{ secrets.PUB_ACCESS_TOKEN_SECRET }}
            PUB_REFRESH_TOKEN_SECRET=${{ secrets.PUB_REFRESH_TOKEN_SECRET }}
            PUB_ACCESS_TOKEN_DURATION=${{ vars.PUB_ACCESS_TOKEN_DURATION }}
            PUB_REFRESH_TOKEN_DURATION=${{ vars.PUB_REFRESH_TOKEN_DURATION }}
            SNAP_BI_MERCHANT_ID=${{ secrets.SNAP_BI_MERCHANT_ID }}
            SNAP_BI_CLIENT_ID=${{ secrets.SNAP_BI_CLIENT_ID }}
            SNAP_BI_PRIVATE_KEY=${{ secrets.SNAP_BI_PRIVATE_KEY }}
            SNAP_BI_CLIENT_SECRET=${{ secrets.SNAP_BI_CLIENT_SECRET }}
            SNAP_BI_PARTNER_ID=${{ secrets.SNAP_BI_PARTNER_ID }}
            SNAP_BI_CHANNEL_ID=${{ secrets.SNAP_BI_CHANNEL_ID }}
            SNAP_BI_PUBLIC_KEY=${{ secrets.SNAP_BI_PUBLIC_KEY }}
            PAYMENT_NOTIFICATION_USER_ID=${{ secrets.PAYMENT_NOTIFICATION_USER_ID }}
            PAYMENT_NOTIFICATION_PASSWORD=${{ secrets.PAYMENT_NOTIFICATION_PASSWORD }}
            BOOKING_HOLD_TIME_MINUTES=${{ vars.BOOKING_HOLD_TIME_MINUTES }}
            BOOKING_GRACE_TIME_MILLIS=${{ vars.BOOKING_GRACE_TIME_MILLIS }}
            NODE_ENV=${{ vars.BACKEND_NODE_ENV }}
            PORT=${{ vars.BACKEND_PORT }}
            EOF
            sudo chown deploy:deploy "$DST/.env"
            sudo chmod 600 "$DST/.env"

            npm ci --production
            npx prisma generate
            npx prisma migrate deploy

            sudo systemctl start "${{ inputs.service_name }}"
